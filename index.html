  <style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Quicksand', sans-serif;
  min-height: 100vh;
background: linear-gradient(135deg, #00d4ff 0%, #0099cc 25%, #0066aa 55%, #003d7a 80%, #001f4d 100%);
  background-attachment: fixed;
}
/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: 70vh;
  overflow: hidden;
  margin-top: 70px; /* push hero BELOW header */
	margin-bottom: 70px;
}

.hero-slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: contain;
  background-position: center;
	 background-repeat: no-repeat;  /* no tiling */
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.hero-slide.active {
  opacity: 1;
  z-index: 1;
}

/* DOTS */
.hero .dots {
  position: absolute;
  bottom: 20px;
  width: fit-content;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
  background: rgba(0, 0, 0, 0.25);
  padding: 6px 14px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}
.hero .dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin: 0 6px;
  background-color: rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  cursor: pointer;
  transition: background-color 0.3s;
}
.hero .dot.active {
  background-color: rgba(255, 255, 255, 1);
}

/* TEXT BAR */
.text-bar {
  width: 100%;
  background: white;
  padding: 20px 0;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.text-bar h1, .text-bar p {
  margin: 0;
  line-height: 1.4;
}
.text-bar h1 {
  margin-bottom: 8px;
}

/* VIDEO SECTION */
.video-section {
  width: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
.video-section video {
  width: 100%;
  height: auto;
  display: block;
  max-height: 80vh;
  object-fit: cover;
}


/* MOBILE HERO FIX */
  @media (max-width: 768px) {
  .hero {
    height: 500px;        /* small but usable */
    padding: 0;
  }

  .hero-slide {
    position: absolute;
    inset: 0;
    background-size: 90% auto;  /* 🔥 key line */
    background-position: center;
    background-repeat: no-repeat;
  }

  .hero .dots {
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.25);
    padding: 6px 14px;
  }
}
	
  </style>
</head>

<section class="hero">
  <div class="hero-slide active" style="background-image: url('placeholders/1.jpg');"></div>
  <div class="hero-slide" style="background-image: url('placeholders/2.jpg');"></div>
  <div class="hero-slide" style="background-image: url('placeholders/3.jpg');"></div>

  <div class="dots">
    <span class="dot active" data-index="0"></span>
    <span class="dot" data-index="1"></span>
    <span class="dot" data-index="2"></span>
  </div>
</section>
	
<script>
const slides = document.querySelectorAll('.hero-slide');
const dots = document.querySelectorAll('.dot');
let currentIndex = 0;

function showSlide(index) {
  index = Number(index); // Ensure index is a number
  slides.forEach((s, i) => s.classList.toggle('active', i === index));
  dots.forEach((d, i) => d.classList.toggle('active', i === index));
  currentIndex = index;
}

let interval = setInterval(() => {
  let next = (currentIndex + 1) % slides.length;
  showSlide(next);
}, 4000);

dots.forEach(dot => {
  dot.addEventListener('click', () => {
    clearInterval(interval);
    showSlide(dot.dataset.index);
    interval = setInterval(() => {
      let next = (currentIndex + 1) % slides.length;
      showSlide(next);
    }, 4000);
  });
});

// Swipe support
const sliderContainer = document.querySelector('.hero');
let startX = 0;

if (sliderContainer) {
  sliderContainer.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
  });

  sliderContainer.addEventListener('touchend', (e) => {
    const endX = e.changedTouches[0].clientX;
    const diff = startX - endX;

    if (Math.abs(diff) > 50) {
      if (diff > 0) {
        let next = (currentIndex + 1) % slides.length;
        showSlide(next);
      } else {
        let prev = (currentIndex - 1 + slides.length) % slides.length;
        showSlide(prev);
      }

      clearInterval(interval);
      interval = setInterval(() => {
        let next = (currentIndex + 1) % slides.length;
        showSlide(next);
      }, 5000);
    }
  });
}

showSlide(0);
</script>
