<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Amtex Contact</title>
 
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;700&display=swap" rel="stylesheet">
 
  <style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Quicksand', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #00d4ff 0%, #0099cc 25%, #0066aa 55%, #003d7a 80%, #001f4d 100%);
  background-attachment: fixed;
}

/* TEXT BAR */
.text-bar {
  width: 100%;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.25);
  padding: 28px 0;
  text-align: center;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  opacity: 0;
  animation: fadeSlideUp 0.5s ease 0s forwards;
}

.text-bar h1 {
  color: white;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-size: 36px !important;
  margin: 0 !important;
}

/* PAGE WRAPPER */
.contact-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px 80px;
  gap: 32px;
}

/* CARDS ROW */
.contact-cards {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 1000px;
}

/* INDIVIDUAL CARD */
.contact-card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 20px;
  padding: 40px 36px;
  flex: 1;
  min-width: 240px;
  max-width: 300px;
  text-align: center;
  color: white;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
  opacity: 0;
  transform: translateY(40px);
  animation: fadeSlideUp 0.6s ease forwards;
transition: transform 0.35s ease, box-shadow 0.35s ease, background 0.35s ease, border-color 0.35s ease;
}

.contact-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
  background: rgba(255, 255, 255, 0.28);
  border-color: rgba(255, 255, 255, 0.7);
}

.contact-card:nth-child(1) { animation-delay: 0.1s; }
.contact-card:nth-child(2) { animation-delay: 0.25s; }
.contact-card:nth-child(3) { animation-delay: 0.4s; }

@keyframes fadeSlideUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* CARD ICON */
.card-icon {
  font-size: 42px;
  margin-bottom: 16px;
  display: block;
  animation: floatIcon 3s ease-in-out infinite;
}

.contact-card:nth-child(2) .card-icon { animation-delay: 0.5s; }
.contact-card:nth-child(3) .card-icon { animation-delay: 1s; }

@keyframes floatIcon {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* CARD TITLE */
.card-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 14px;
}

/* CARD CONTENT */
.card-content {
  font-size: 18px;
  font-weight: 300;
  line-height: 1.8;
  color: white;
}

.card-content a {
  color: white;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.4);
  transition: border-color 0.2s;
}

.card-content a:hover {
  border-color: white;
}

/* DIVIDER */
.card-divider {
  width: 40px;
  height: 2px;
  background: rgba(255,255,255,0.4);
  margin: 0 auto 20px;
  border-radius: 2px;
}

/* HOURS TABLE */
.hours-table {
  width: 100%;
  border-collapse: collapse;
}

.hours-table tr {
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.hours-table tr:last-child {
  border-bottom: none;
}

.hours-table td {
  padding: 6px 4px;
  font-size: 15px;
  font-weight: 300;
}

.hours-table td:first-child {
  text-align: left;
  color: rgba(255,255,255,0.75);
}

.hours-table td:last-child {
  text-align: right;
  color: white;
}

.hours-closed {
  color: rgba(255,255,255,0.4) !important;
}

/* TEXT BAR ANIMATION */
.text-bar {
  opacity: 0;
  animation: fadeSlideUp 0.5s ease 0s forwards;
}

/* CONTACT FORM CARD */
.contact-form-card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 20px;
  padding: 48px 48px;
  width: 100%;
  max-width: 1000px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
  opacity: 0;
  animation: fadeSlideUp 0.6s ease 0.55s forwards;
  box-sizing: border-box;
transition: box-shadow 0.35s ease, background 0.35s ease, border-color 0.35s ease;
}
.contact-form-card:hover {
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
  background: rgba(255, 255, 255, 0.28);
  border-color: rgba(255, 255, 255, 0.7);
}
.form-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 28px;
  text-align: center;
}

.form-row {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.form-group {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 200px;
}

.form-group label {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  margin-bottom: 8px;
}

.form-group input,
.form-group textarea {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'Quicksand', sans-serif;
  font-size: 16px;
  font-weight: 300;
  color: white;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: rgba(255,255,255,0.35);
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.2);
}

.form-group textarea {
  resize: vertical;
  min-height: 120px;
}

.form-submit {
  display: flex;
  justify-content: center;
  margin-top: 28px;
}

.btn-submit {
  background: white;
  color: #0066aa;
  border: none;
  border-radius: 40px;
  padding: 16px 48px;
  font-family: 'Quicksand', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.btn-submit:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  background: #f0f8ff;
}

.btn-submit:active {
  transform: translateY(0);
}

/* SUCCESS MESSAGE */
.form-success {
  display: none;
  text-align: center;
  color: white;
  font-size: 18px;
  font-weight: 300;
  padding: 20px;
  animation: fadeSlideUp 0.4s ease forwards;
}

.form-success span {
  font-size: 40px;
  display: block;
  margin-bottom: 12px;
}

/* RESPONSIVE */
@media (max-width: 700px) {
  .contact-card {
    max-width: 100%;
    min-width: unset;
    width: 100%;
  }

  .contact-form-card {
    padding: 32px 24px;
  }

  .form-row {
    flex-direction: column;
  }
}
  </style>
</head>

<body>

<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a href="index.html"><img src="images/amtexlogo.png" alt="Amtex Logo" class="logo"></a>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="Contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<br><br><br><br><br><br>

<section class="text-bar">
  <h1 style="font-family: 'Quicksand', sans-serif; text-align:center; margin-top:20px; font-weight: 400; font-size: 40px;">Get in Touch</h1>
</section>

<div class="contact-page">

  <!-- INFO CARDS -->
  <div class="contact-cards">

    <!-- PHONE -->
    <div class="contact-card">
      <span class="card-icon">📞</span>
      <div class="card-title">Phone</div>
      <div class="card-divider"></div>
      <div class="card-content">
        <a href="tel:+18005550100">(555) 123-4567</a>
      </div>
    </div>

    <!-- ADDRESS -->
    <div class="contact-card">
      <span class="card-icon">📍</span>
      <div class="card-title">Location</div>
      <div class="card-divider"></div>
      <div class="card-content">
        123 Harbor Lane<br>
        Marina City, CA 90210
      </div>
    </div>

    <!-- HOURS -->
    <div class="contact-card">
      <span class="card-icon">🕐</span>
      <div class="card-title">Weekly Hours</div>
      <div class="card-divider"></div>
      <div class="card-content">
        <table class="hours-table">
          <tr><td>Mon – Fri</td><td>9am – 5pm</td></tr>
          <tr><td>Saturday - Sunday</td><td class="hours-closed">Closed</td></tr>
         
        </table>
      </div>
    </div>

  </div>

  <!-- CONTACT FORM -->
  <div class="contact-form-card">
    <div class="form-title">Send us a Message</div>

    <div id="contactForm">
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="your@email.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Boat Make/Model</label>
          <input type="text" placeholder="What kind of boat do you have?" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Message</label>
          <textarea placeholder="How can we assist you?"></textarea>
        </div>
      </div>
      <div class="form-submit">
        <button class="btn-submit" onclick="submitForm()">Send Message</button>
      </div>
    </div>

    <div class="form-success" id="formSuccess">
      <span>✅</span>
      Thanks! We'll get back to you soon.
    </div>

  </div>

</div>

<script src="js/navbar.js"></script>

<script>
function submitForm() {
  document.getElementById('contactForm').style.display = 'none';
  const success = document.getElementById('formSuccess');
  success.style.display = 'block';
}
</script>

  </div>
</footer>

</body>
</html>
